<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amplop THR</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- Confetti -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
  background: linear-gradient(135deg, #0f172a, #1e3a8a);
  font-family: 'Poppins', sans-serif;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  margin: 0;
}

/* Card */
.card-box {
  background: #1e293b;
  padding: 40px;
  border-radius: 20px;
  text-align: center;
  box-shadow: 0 20px 50px rgba(0,0,0,0.4);
  width: 350px;
}

/* Judul */
h1 {
  font-size: 24px;
  margin-bottom: 10px;
}

p {
  color: #cbd5f5;
}

/* Amplop */
.envelope {
  width: 180px;
  height: 110px;
  background: #facc15;
  margin: 30px auto;
  position: relative;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.3s;
}

/* Tutup */
.flap {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #eab308;
  clip-path: polygon(0 0, 50% 60%, 100% 0);
  transform-origin: top;
  transition: 0.4s ease;
}

/* Uang */
.money {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, 20px) scale(0);
  background: white;
  color: black;
  padding: 8px 12px;
  border-radius: 8px;
  font-weight: bold;
  transition: 0.4s ease;
}

/* Saat buka */
.open .flap {
  transform: rotateX(180deg);
}

.open .money {
  transform: translate(-50%, -50%) scale(1);
}

/* Hasil */
#hasil {
  margin-top: 15px;
  font-size: 18px;
  display: none;
}
</style>
</head>

<body>

<div class="card-box">
  <h1>🧧 Amplop THR</h1>
  <p>Klik amplop untuk membuka rezeki</p>

  <div class="envelope" id="amplop">
    <div class="flap"></div>
    <div class="money" id="uang">Rp 0</div>
  </div>

  <div id="hasil"></div>
</div>

<script>
$(document).ready(function(){

  $("#amplop").click(function(){

    let thr = Math.floor(Math.random() * 100000) + 20000;
    let format = thr.toLocaleString("id-ID");

    $("#uang").text("Rp " + format);

    $(this).addClass("open");

    $("#hasil")
      .hide()
      .text("🎉 Kamu dapat THR Rp " + format)
      .fadeIn();

    confetti({
      particleCount: 120,
      spread: 90,
      origin: { y: 0.6 }
    });

  });

});
</script>

</body>
</html>
